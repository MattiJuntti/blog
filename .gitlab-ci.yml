default:
  image: hugomods/hugo:exts

test:  # builds and tests your site
  script:
    - hugo --cleanDestinationDir --ignoreCache
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

create-pages:
  stage: deploy
  script:
    - ls -la
    - rm -v .hugo_build.lock
    - hugo --cleanDestinationDir --ignoreCache
  pages: true
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
