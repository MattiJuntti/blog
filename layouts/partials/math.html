    <script id = "MathJax-script" async src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script>
        MathJax = {
            loader : { load : ['[tex]/textmacros'] },
            tex    : {
                tags        : 'ams',
                packages    : {'[+]': ['textmacros']},
                displayMath : [['\\[', '\\]'], ['$$', '$$']],  // block
                inlineMath  : [['\\(', '\\)'], ['$', '$']]     // inline
            },
            options : {
                enableMenu : false
            }
        };
    </script>
